[build]
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.161.1"

[context.production]
  command = "hugo"

[context.deploy-preview]
  command = "hugo -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo -b $DEPLOY_PRIME_URL"

[dev]
  command = "hugo server --appendPort=false --baseURL http://localhost:8888"
  targetPort = 1313

[[edge_functions]]
  function = "auth-gate"
  path = "/*"
