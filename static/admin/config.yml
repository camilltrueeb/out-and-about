backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "assets/images"
public_folder: "/images"
output_format: toml
extension: md

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Cover"
        name: "cover"
        widget: "object"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image", required: false, hint: "Recommended: compress images to under 500KB" }
          - { label: "Alt text", name: "alt", widget: "string", required: false }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "wishlist"
    label: "Wishlist"
    folder: "content/wishlist"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - label: "Type"
        name: "activity"
        widget: "select"
        options: ["Hike", "Bicycle", "Canoe", "City", "Escape", "Travel", "Group"]
      - { label: "Distance from Zürich (km)", name: "distance_km", widget: "number", required: false }
      - { label: "Reference link", name: "reference", widget: "string", required: false }
      - { label: "Picture", name: "image", widget: "image", required: false }
      - { label: "Notes", name: "notes", widget: "text", required: false }