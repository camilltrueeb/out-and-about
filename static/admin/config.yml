backend:
  name: git-gateway
  branch: main
  proxy_url: http://localhost:8081/api/v1

local_backend: true

media_folder: "static/images"
public_folder: "/images"
output_format: toml
extension: md

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image", required: false, hint: "Recommended: compress images to under 500KB" }
      - { label: "Body", name: "body", widget: "markdown" }