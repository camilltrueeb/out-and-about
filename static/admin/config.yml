backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "static/images"
public_folder: "/images"
output_format: toml
extension: md

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Cover"
        name: "cover"
        widget: "object"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image", required: false, hint: "JPEG or PNG only — HEIC from Apple Photos is not supported. Export as JPEG first." }
          - { label: "Alt text", name: "alt", widget: "string", required: false }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "wohin"
    label: "Wohin"
    folder: "content/wohin"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - label: "Type"
        name: "activity"
        widget: "select"
        options: ["Wandern", "Velo", "Wasser", "Stadt", "Zen", "Reise", "Social"]
      - { label: "Distanz von ZH (km)", name: "distance_km", widget: "number", required: false }
      - { label: "Reference link", name: "reference", widget: "string", required: false }
      - { label: "Picture", name: "image", widget: "image", required: false, hint: "JPEG or PNG only — HEIC from Apple Photos is not supported. Export as JPEG first." }
      - { label: "Notes", name: "notes", widget: "text", required: false }
