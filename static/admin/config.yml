backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "assets/images"
public_folder: "/images"
output_format: toml
extension: md

collections:
  - name: "posts"
    label: "Beiträge"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - label: "Titelbild"
        name: "cover"
        widget: "object"
        required: false
        fields:
          - { label: "Bild", name: "image", widget: "image", required: false }
          - { label: "Bildtext", name: "alt", widget: "string", required: false }
          - { label: "Bildunterschrift", name: "caption", widget: "string", required: false }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "wohin"
    label: "Wohin"
    folder: "content/wohin"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - label: "Art"
        name: "activity"
        widget: "select"
        options: ["Wanderung", "Fahrrad", "Kanu", "Stadt", "Auszeit", "Reise", "Gruppe"]
      - { label: "Distanz ab Zürich (km)", name: "distance_km", widget: "number", required: false }
      - { label: "Referenz-Link", name: "reference", widget: "string", required: false }
      - { label: "Bild", name: "image", widget: "image", required: false }
      - { label: "Notizen", name: "notes", widget: "text", required: false }
