<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Out and About – Einloggen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }
    .box { text-align: center; padding: 2rem; max-width: 320px; width: 100%; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
    button {
      padding: 10px 32px;
      border-radius: 8px;
      background: #333;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Out and About</h1>
    <p>Bitte einloggen um fortzufahren.</p>
    <button id="login-btn">Einloggen</button>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
  (function () {
    var btn = document.getElementById('login-btn');

    function getRedirectTarget() {
      var params = new URLSearchParams(location.search);
      var target = params.get('redirect');
      if (!target || target.startsWith('//') || /^https?:\/\//i.test(target)) return '/';
      return target;
    }

    netlifyIdentity.on('error', function (e) {
      console.error('[login] identity error:', e);
    });

    netlifyIdentity.on('init', function (user) {
      if (!user) return;
      location.replace(getRedirectTarget());
    });

    netlifyIdentity.on('login', function () {
      netlifyIdentity.close();
      location.replace(getRedirectTarget());
    });

    try {
      netlifyIdentity.init();
    } catch (e) {
      console.error('[login] netlifyIdentity.init() threw:', e.message);
    }

    btn.addEventListener('click', function () {
      netlifyIdentity.open();
    });
  }());
  </script>
</body>
</html>
