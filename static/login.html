<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Out and About – Einloggen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }
    .box { text-align: center; padding: 2rem; max-width: 320px; width: 100%; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
    button {
      padding: 10px 32px;
      border-radius: 8px;
      background: #333;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Out and About</h1>
    <p>Bitte einloggen um fortzufahren.</p>
    <button id="login-btn">Einloggen</button>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
  (function () {
    var COOKIE_NAME = 'auth_token';
    var btn = document.getElementById('login-btn');

    function jwtExp(token) {
      try {
        var b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(atob(b64 + '='.repeat((4 - b64.length % 4) % 4))).exp || 0;
      } catch (e) {
        console.error('[login] failed to parse JWT exp:', e.message);
        return 0;
      }
    }

    function setJwtCookie(token) {
      var maxAge = Math.max(60, jwtExp(token) - Math.floor(Date.now() / 1000));
      document.cookie = COOKIE_NAME + '=' + encodeURIComponent(token) +
        '; path=/; max-age=' + maxAge + '; SameSite=Strict';
    }

    function getRedirectTarget() {
      var params = new URLSearchParams(location.search);
      var target = params.get('redirect');
      if (!target || target.startsWith('//') || /^https?:\/\//i.test(target)) return '/';
      return target;
    }

    netlifyIdentity.on('error', function (e) {
      console.error('[login] identity error:', e);
    });

    netlifyIdentity.on('init', function (user) {
      if (!user) return;
      user.jwt().then(function (freshToken) {
        setJwtCookie(freshToken);
        location.replace(getRedirectTarget());
      }).catch(function (e) {
        console.error('[login] token refresh failed:', e && e.message);
        netlifyIdentity.logout();
      });
    });

    netlifyIdentity.on('login', function (user) {
      var token = user && user.token && user.token.access_token;
      if (!token) {
        console.error('[login] login event: no access_token on user');
        return;
      }
      if (jwtExp(token) * 1000 <= Date.now()) {
        console.error('[login] login event: token already expired');
        return;
      }
      setJwtCookie(token);
      netlifyIdentity.close();
      location.replace(getRedirectTarget());
    });

    try {
      netlifyIdentity.init();
    } catch (e) {
      console.error('[login] netlifyIdentity.init() threw:', e.message);
    }

    btn.addEventListener('click', function () {
      netlifyIdentity.open();
    });
  }());
  </script>
</body>
</html>
