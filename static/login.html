<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Out and About – Einloggen</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }
    .box {
      text-align: center;
      padding: 2rem;
      max-width: 320px;
      width: 100%;
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
    button {
      padding: 10px 32px;
      border-radius: 8px;
      background: #333;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Out and About</h1>
    <p>Bitte einloggen um fortzufahren.</p>
    <button id="login-btn">Einloggen</button>
  </div>
  <script>
  (function () {
    var COOKIE_NAME = 'nf_jwt';
    var MAX_AGE = 60 * 60 * 24 * 7; // 7 days

    function setJwtCookie(token) {
      document.cookie = COOKIE_NAME + '=' + encodeURIComponent(token) +
        '; path=/; max-age=' + MAX_AGE + '; SameSite=Strict';
    }

    function clearJwtCookie() {
      document.cookie = COOKIE_NAME + '=; path=/; max-age=0';
    }

    function getRedirectTarget() {
      var params = new URLSearchParams(location.search);
      var target = params.get('redirect');
      if (!target || target.startsWith('//') || /^https?:\/\//i.test(target)) return '/';
      return target;
    }

    netlifyIdentity.on('init', function (user) {
      if (user && user.token && user.token.access_token) {
        setJwtCookie(user.token.access_token);
        location.replace(getRedirectTarget());
      }
    });

    netlifyIdentity.on('login', function (user) {
      if (user && user.token && user.token.access_token) {
        setJwtCookie(user.token.access_token);
      }
      netlifyIdentity.close();
      location.replace(getRedirectTarget());
    });

    document.getElementById('login-btn').addEventListener('click', function () {
      netlifyIdentity.open();
    });
  }());
  </script>
</body>
</html>
