<button id="auth-logout" onclick="netlifyIdentity.logout()">Ausloggen</button>

<script>
(function () {
  var COOKIE_NAME = 'nf_jwt';
  var MAX_AGE = 60 * 60 * 24 * 7; // 7 days
  var logout = document.getElementById('auth-logout');

  // No auth management needed in local development
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    logout.style.display = 'none';
    return;
  }

  // If the edge function let us reach this page, the user is authenticated.
  // Show the logout button immediately — don't wait for the Identity widget.
  logout.style.display = 'block';

  function setJwtCookie(token) {
    document.cookie = COOKIE_NAME + '=' + encodeURIComponent(token) +
      '; path=/; max-age=' + MAX_AGE + '; SameSite=Strict';
  }

  function clearJwtCookie() {
    document.cookie = COOKIE_NAME + '=; path=/; max-age=0';
  }

  // Refresh the cookie whenever Identity has a fresh token, but never
  // redirect here — the edge function is the sole gatekeeper.
  netlifyIdentity.on('init', function (user) {
    if (user && user.token && user.token.access_token) {
      setJwtCookie(user.token.access_token);
    }
  });

  netlifyIdentity.on('login', function (user) {
    if (user && user.token && user.token.access_token) {
      setJwtCookie(user.token.access_token);
    }
    netlifyIdentity.close();
  });

  netlifyIdentity.on('logout', function () {
    clearJwtCookie();
    logout.style.display = 'none';
    location.replace('/login');
  });

  // Keep cookie fresh when Netlify Identity silently refreshes the token
  netlifyIdentity.on('token', function (token) {
    if (token && token.access_token) {
      setJwtCookie(token.access_token);
    }
  });
}());
</script>
