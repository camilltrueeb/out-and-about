<style>
  .entry-cover img {
    aspect-ratio: 16 / 9;
    object-fit: cover;
    object-position: center;
  }

  /* Wohin filter bar */
  .wl-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .wl-filter {
    background: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 4px 12px;
    color: var(--secondary);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .wl-filter:hover { background: var(--entry); color: var(--primary); }
  .wl-filter.active { background: var(--primary); color: var(--theme); border-color: var(--primary); }
  .wl-filter-sprite { display: inline-flex; align-items: center; }
  .wl-filter-sprite svg { width: 14px; height: 14px; image-rendering: pixelated; image-rendering: crisp-edges; }
  .tag-icon { width: 18px; height: 18px; shape-rendering: crispEdges; image-rendering: pixelated; image-rendering: crisp-edges; }

  /* Sortable column headers */
  .wl-sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  .wl-sortable:hover { color: var(--primary); }
  .wl-sort-icon { font-size: 0.8em; }

  /* Wohin table */
  .wishlist-wrap { overflow-x: visible; }
  .wishlist {
    width: 120%;
    margin-left: -10%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }
  .wishlist th, .wishlist td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .wishlist th { color: var(--secondary); font-weight: 600; white-space: nowrap; }
  .wishlist tbody tr:hover { background: var(--entry); }
  .wishlist-img-cell { width: 72px; padding: 6px 8px; }
  .wishlist-thumb {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    display: block;
  }
  .wishlist-name { font-weight: 500; }
  .wishlist-notes { color: var(--secondary); max-width: 260px; }
  .wishlist-auto { white-space: nowrap; }
  .wishlist-tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    margin: 1px;
    cursor: default;
  }
  .wishlist-tag svg {
    width: 22px;
    height: 22px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .wishlist-tag--wandern { color: #3a9a50; }
  .wishlist-tag--fahrrad { color: #2868c0; }
  .wishlist-tag--kanu    { color: #1080a0; }
  .wishlist-tag--stadt   { color: #7030b0; }
  .wishlist-tag--auszeit { color: #b09000; }
  .wishlist-tag--reise   { color: #c03030; }
  .wishlist-tag--gruppe  { color: #c04010; }
  .wishlist-tag--velo    { color: #2868c0; }
  .wishlist-tag--zen     { color: #b01840; }
  .wishlist-tag--wasser  { color: #1890c0; }
  .wishlist-tag--zelten  { color: #c07020; }
  .wishlist-tag--sac     { color: #5070a0; }

  /* Besuche column */
  .wishlist-visits { white-space: nowrap; }
  .wl-count { display: inline-block; min-width: 1.5rem; text-align: center; }
  .wl-inc, .wl-dec {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 1px 6px;
    color: var(--primary);
  }
  .wl-inc { margin-left: 4px; }
  .wl-dec { margin-right: 4px; }
  .wl-inc:hover, .wl-dec:hover { background: var(--entry); }
  .wl-inc:disabled, .wl-dec:disabled { opacity: 0.4; cursor: default; }

  /* Map + download buttons */
  .wishlist-map-cell { width: 68px; text-align: center; padding: 6px 4px; white-space: nowrap; }
  .wl-map-btn,
  .wl-gpx-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    padding: 4px 6px;
    color: var(--secondary);
    display: inline-flex;
    align-items: center;
    line-height: 1;
  }
  .wl-map-btn:hover,
  .wl-gpx-btn:hover { background: var(--entry); color: var(--primary); border-color: var(--primary); }
  a.wl-gpx-btn { display: inline-flex; text-decoration: none; margin-left: 4px; }
  button.wl-gpx-btn { margin-left: 4px; }

  /* Map modal */
  #wl-map-modal {
    border: none;
    padding: 0;
    border-radius: 10px;
    overflow: hidden;
    width: min(760px, 95vw);
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  }
  #wl-map-modal::backdrop { background: rgba(0,0,0,0.55); cursor: pointer; }
  .wl-map-inner { display: flex; flex-direction: column; }
  .wl-map-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--entry);
    border-bottom: 1px solid var(--border);
    font-size: 1rem;
  }
  .wl-map-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: var(--secondary);
    padding: 2px 7px;
    line-height: 1;
    border-radius: 4px;
  }
  .wl-map-close:hover { background: var(--border); color: var(--primary); }
  #wl-map-el { height: 500px; }

  /* Gallery */
  #wl-gallery {
    border: none;
    padding: 0;
    background: rgba(0,0,0,0.92);
    width: 100dvw;
    height: 100dvh;
    max-width: 100dvw;
    max-height: 100dvh;
  }
  #wl-gallery::backdrop { background: transparent; }
  .wl-gallery-inner { position: relative; width: 100%; height: 100%; }
  .wl-gallery-wrap {
    display: flex;
    height: 100%;
    width: 100%;
    overflow-x: scroll;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
  }
  .wl-gallery-wrap::-webkit-scrollbar { display: none; }
  .wl-gallery-wrap img {
    height: 100%;
    width: auto;
    flex-shrink: 0;
    object-fit: contain;
    scroll-snap-align: start;
  }
  .wl-gallery-close,
  .wl-gallery-prev,
  .wl-gallery-next {
    position: absolute;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .wl-gallery-close { top: 16px; right: 16px; }
  .wl-gallery-prev { left: 16px; top: 50%; transform: translateY(-50%); }
  .wl-gallery-next { right: 16px; top: 50%; transform: translateY(-50%); }
  .wl-gallery-prev:disabled,
  .wl-gallery-next:disabled { opacity: 0.3; cursor: default; }
  .wl-gallery-close:hover,
  .wl-gallery-prev:hover:not(:disabled),
  .wl-gallery-next:hover:not(:disabled) { background: rgba(0,0,0,0.8); }
</style>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  #auth-logout {
    position: fixed;
    bottom: 12px;
    right: 12px;
    font-size: 0.75rem;
    color: var(--secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: inherit;
    display: none;
  }
  #auth-logout:hover { color: var(--primary); border-color: var(--primary); }
</style>
