<style>
  .entry-cover img {
    aspect-ratio: 16 / 9;
    object-fit: cover;
    object-position: center;
  }

  /* Wohin filter bar */
  .wl-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .wl-filter {
    background: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 4px 12px;
    color: var(--secondary);
  }
  .wl-filter:hover { background: var(--entry); color: var(--primary); }
  .wl-filter.active { background: var(--primary); color: var(--theme); border-color: var(--primary); }

  /* Sortable column headers */
  .wl-sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  .wl-sortable:hover { color: var(--primary); }
  .wl-sort-icon { font-size: 0.8em; }

  /* Wohin table */
  .wishlist-wrap { overflow-x: auto; }
  .wishlist {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }
  .wishlist th, .wishlist td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .wishlist th { color: var(--secondary); font-weight: 600; white-space: nowrap; }
  .wishlist tbody tr:hover { background: var(--entry); }
  .wishlist-img-cell { width: 72px; padding: 6px 8px; }
  .wishlist-thumb {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    display: block;
  }
  .wishlist-name { font-weight: 500; }
  .wishlist-notes { color: var(--secondary); max-width: 260px; }
  .wishlist-distance { white-space: nowrap; }
  .wishlist-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    background: var(--code-bg);
  }
  .wishlist-tag--wanderung { background: #d4edda; color: #1a5c2a; }
  .wishlist-tag--fahrrad   { background: #cce5ff; color: #004085; }
  .wishlist-tag--kanu      { background: #d1ecf1; color: #0c5460; }
  .wishlist-tag--stadt     { background: #e2d9f3; color: #4a235a; }
  .wishlist-tag--auszeit   { background: #fff3cd; color: #856404; }
  .wishlist-tag--reise     { background: #fde8d8; color: #7d3c10; }
  .wishlist-tag--gruppe    { background: #f8d7da; color: #721c24; }

  /* Besuche column */
  .wishlist-visits { white-space: nowrap; }
  .wl-count { display: inline-block; min-width: 1.5rem; text-align: center; }
  .wl-inc, .wl-dec {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 1px 6px;
    color: var(--primary);
  }
  .wl-inc { margin-left: 4px; }
  .wl-dec { margin-right: 4px; }
  .wl-inc:hover, .wl-dec:hover { background: var(--entry); }
  .wl-inc:disabled, .wl-dec:disabled { opacity: 0.4; cursor: default; }

  /* Lightbox */
  #wl-lb {
    border: none;
    background: transparent;
    padding: 0;
    max-width: 90vw;
    max-height: 90vh;
  }
  #wl-lb::backdrop {
    background: rgba(0, 0, 0, 0.75);
    cursor: zoom-out;
  }
  #wl-lb img {
    display: block;
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    object-fit: contain;
  }
